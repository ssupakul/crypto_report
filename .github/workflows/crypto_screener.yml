name: Coindesk Crypto Screener

on:
  schedule:
    # รันทุก 4 ชั่วโมง เริ่มต้นที่นาทีที่ 30 ของชั่วโมงนั้นๆ (เวลา UTC)
    # 00:30, 04:30, 08:30, 12:30, 16:30, 20:30 UTC
    - cron: '30 */4 * * *'
  workflow_dispatch: # เปิดให้สามารถกดรันเทสเองแบบ Manual ได้

jobs:
  run-screener:
    runs-on: ubuntu-latest  # แก้ไขจุดที่ผิดพลาดตรงนี้แล้วครับ

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python screener.py
