name: Crypto Market Screener

on:
  schedule:
    # รันทุก 4 ชั่วโมง เริ่มต้นที่นาทีที่ 30 ของชั่วโมงนั้นๆ (เวลาในนี้เป็น UTC)
    # เช่น 00:30, 04:30, 08:30, 12:30, 16:30, 20:30 UTC
    - cron: '30 */4 * * *'
  workflow_dispatch: # เปิดให้เราสามารถกดคลิกเพื่อสั่งรันเทสเองแบบ Manual ได้ด้วย

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # ขั้นตอนที่ 1: ดึงโค้ดจาก Repository มาไว้ในเครื่องจำลอง
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ขั้นตอนที่ 2: ติดตั้ง Python (เลือกเวอร์ชันที่ต้องการได้)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ขั้นตอนที่ 3: ติดตั้ง Library ต่างๆ ที่จำเป็น
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # ขั้นตอนที่ 4: สั่งรันสคริปต์ Python ของเรา
    - name: Run Crypto Screener Script
    env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID}}
   run: python screener.py
  
